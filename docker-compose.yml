name: shopfloor-manager

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    ports:
      - "1883:1883"   # MQTT — máy CNC publish vào đây

  api:
    build:
      context: ./src
      dockerfile: ShopfloorManager.API/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: ${MINIO_USER}
      Minio__SecretKey: ${MINIO_PASSWORD}
      Minio__Bucket: ${MINIO_BUCKET}
      Minio__UseSsl: "false"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__ExpiryHours: ${JWT_EXPIRY_HOURS:-8}
      Mqtt__Broker: "mosquitto"
      Mqtt__Port: "1883"
      Mqtt__TopicCnc: ${MQTT_TOPIC_CNC:-factory/cnc/#}
      Email__Host: ${SMTP_HOST:-}
      Email__Port: ${SMTP_PORT:-587}
      Email__User: ${SMTP_USER:-}
      Email__Password: ${SMTP_PASSWORD:-}
      Email__From: ${SMTP_FROM:-noreply@shopfloor.local}
      Teams__WebhookUrl: ${TEAMS_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mosquitto:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./clients/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Shopfloor Manager}
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  minio_data:
  mosquitto_data:
  mosquitto_logs:
